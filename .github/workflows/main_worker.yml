name: Automation Worker

on:
  schedule:
    # รันทุก 5 นาที (ความถี่สูงสุดที่ GitHub อนุญาต)
    # เวลาในนี้เป็น UTC (เวลาไทยลบด้วย 7 ชม.)
    - cron: '*/5 * * * *'
  workflow_dispatch: # ปุ่มกดรันเองได้จากหน้าเว็บ GitHub (เผื่ออยากทดสอบ)

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Python Script
        run: python api.py
        env:
          # หากโค้ดต้องใช้ API Key ให้ใส่ไว้ใน GitHub Secrets
          API_KEY: ${{ secrets.MY_API_KEY }}

      - name: Commit and Push changes
        # หากสคริปต์มีการบันทึกไฟล์ภาพหรือข้อมูล และต้องการให้มันเซฟกลับเข้า Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update data: $(date)" || echo "No changes to commit"
          git push      