name: Automation Worker

on:
  schedule:
    - cron: '*/5 * * * *' # รันทุก 5 นาที
  workflow_dispatch:      # กดรันเองได้

jobs:
  run-script:
    runs-on: ubuntu-latest
    # เพิ่มสิทธิ์ให้ GitHub Actions สามารถเขียนไฟล์ (Write) กลับเข้า Repo ได้
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # แก้ไข Path ให้ไปที่โฟลเดอร์ Config
          if [ -f Config/requirements.txt ]; then pip install -r Config/requirements.txt; fi

      - name: Run Python Script
        run: |
          # สั่งให้รันไฟล์ api.py ที่อยู่ในโฟลเดอร์ Backend
          python Backend/api.py
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # บันทึกการเปลี่ยนแปลงทั้งหมด (รวมถึงรูปภาพใหม่ๆ ถ้ามี)
          git add .
          git commit -m "Auto update data: $(date)" || echo "No changes to commit"
          git push origin main      